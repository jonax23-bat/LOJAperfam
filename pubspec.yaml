name: projeto_catalogo_digital
description: Um novo projeto Flutter para o catálogo digital de perfumes.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  flutter_riverpod: ^2.4.9
  image_picker: ^1.0.7
  cached_network_image: ^3.3.0
  font_awesome_flutter: ^10.6.0
  url_launcher: ^6.2.4
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  cloud_functions: ^6.2.0
  google_generative_ai: ^0.4.7
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/perfume1.png
    - assets/images/perfume2.png
